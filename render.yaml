services:
  # ── API Server ────────────────────────────────────────────────────────────
  # Handles all /api/* routes, proxies to your Render-hosted Ollama, stores data.
  - type: web
    name: ares-api
    env: node
    plan: starter
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      # Set this in Render dashboard to your Ollama service URL:
      #   Public URL:  https://my-ollama.onrender.com
      #   Private DNS: http://my-ollama:11434  (if same Render account)
      - key: OLLAMA_URL
        sync: false
      - key: OLLAMA_MODEL
        value: llama3.2-vision:11b
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /opt/render/project/.ares-data
      # Optional: set your GROQ API key in the Render dashboard (do NOT commit keys)
      - key: GROQ_API_KEY
        sync: false

  # ── Frontend (static site) ────────────────────────────────────────────────
  # JoyedTiers leaderboard with the hidden A.R.E.S. overlay.
  - type: web
    name: ares-frontend
    env: static
    plan: free
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter @workspace/ares run build
    staticPublishPath: artifacts/ares/dist/public
    routes:
      # Proxy /api/* to ares-api — no CORS needed, same domain via Render edge
      - type: rewrite
        source: /api/*
        destination: https://ares-api.onrender.com/api/$1
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: BASE_PATH
        value: /
      - key: PORT
        value: 10000
      # Optional: set this to your production API URL (sync in dashboard)
      - key: VITE_API_URL
        sync: false
      # Uncomment to load real JoyedTiers leaderboard data:
      # - key: VITE_API_URL
      #   value: https://api.joyedtiers.com
